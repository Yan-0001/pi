name: Web Fetch
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
        type: string
      output_file:
        description: 'Output file'
        required: false
        default: 'response.txt'
        type: string
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch URL
        run: |
          curl -sL --max-time 30 "${{ inputs.url }}" -o "${{ inputs.output_file }}"
          echo "=== RESPONSE ==="
          head -c 5000 "${{ inputs.output_file }}"
          echo "=== END ==="
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add "${{ inputs.output_file }}" || true
          git diff --cached --quiet || git commit -m "fetch response"
          git push
